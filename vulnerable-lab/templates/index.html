<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CiberBank - Asistente Virtual</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #c0392b; }
        #chat-box { background: white; border: 1px solid #ddd; border-radius: 8px; height: 400px; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
        .message { margin-bottom: 12px; }
        .user { color: #2c3e50; font-weight: bold; }
        .assistant { color: #27ae60; }
        #input-area { display: flex; gap: 8px; }
        #user-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { padding: 10px 20px; background: #c0392b; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #a93226; }
        #reset-btn { background: #7f8c8d; }
        .warning { background: #ffeaa7; border-left: 4px solid #fdcb6e; padding: 10px; margin-bottom: 16px; font-size: 13px; }
    </style>
</head>
<body>
    <h1>CiberBank — Asistente Virtual</h1>
    <div class="warning">
        ⚠️ <strong>LABORATORIO VULNERABLE</strong> — Esta app contiene vulnerabilidades intencionadas para fines educativos. No usar en producción.
    </div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Escribe tu mensaje..." />
        <button onclick="sendMessage()">Enviar</button>
        <button id="reset-btn" onclick="resetChat()">Reiniciar</button>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");

        userInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

        function appendMessage(role, text) {
            const div = document.createElement("div");
            div.className = "message";
            // VULNERABILIDAD LLM05: innerHTML renderiza HTML sin sanitizar
            div.innerHTML = `<span class="${role}">${role === "user" ? "Tú" : "Asistente"}:</span> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            userInput.value = "";
            appendMessage("user", message);

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            appendMessage("assistant", data.response);
        }

        async function resetChat() {
            await fetch("/reset", { method: "POST" });
            chatBox.innerHTML = "";
        }
    </script>
</body>
</html>
